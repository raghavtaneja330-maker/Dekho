<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vahgar hub</title>
    <style>
        /* Basic Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #e91e63;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .product {
            background: white;
            width: 280px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
            padding-bottom: 15px;
        }

        .product img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .product h3 {
            margin: 10px 0 5px;
        }

        .price {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #1ebe5d;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
            font-size: 14px;
        }

        @media(max-width: 600px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

<header>
    My Cloth Store
</header>

<div class="container">

    <!-- Product 1 -->
    <div class="product">
        <img src="https://ibb.co/N2MrC01k"text=japnese+pent" alt="Japanese pent">
        <h3>Japanese pent</h3>
        <p class="price">₹490</p>
        <a class="btn" 
           href="https://wa.me/919368388707?text=Hello%20mujhe%20Red%20Kurti%20order%20karni%20hai" 
           target="_blank">
           Order on WhatsApp
        </a>
    </div>

    <!-- Product 2 -->
    <div class="product">
        <img src="https://via.placeholder.com/300x300.png?text=Blue+Saree" alt="Blue Saree">
        <h3>Blue Saree</h3>
        <p class="price">₹1299</p>
        <a class="btn" 
           href="https://wa.me/919368388707?text=Hello%20mujhe%20Blue%20Saree%20order%20karni%20hai" 
           target="_blank">
           Order on WhatsApp
        </a>
    </div>

    <!-- Product 3 -->
    <div class="product">
        <img src="https://via.placeholder.com/300x300.png?text=Men+T-Shirt" alt="Men T-Shirt">
        <h3>Men T-Shirt</h3>
        <p class="price">₹599</p>
        <a class="btn" 
           href="https://wa.me/91936838707?text=Hello%20mujhe%20Men%20T-Shirt%20order%20karna%20hai" 
           target="_blank">
           Order on WhatsApp
        </a>
    </div>

</div>

<footer>
    © 2026 My Cloth Store | Contact: 9368388707
</footer>

</body>
</html>
